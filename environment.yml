name: photography-teaching
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # Web UI
    - gradio==6.11.0

    # Image processing
    - Pillow==12.2.0

    # Environment / config
    - python-dotenv==1.0.1

    # LLM providers
    - openai==2.30.0
    - google-genai==1.70.0

    # Local VLM backend (optional — only needed for eval_provider="qwen")
    # Install PyTorch separately first: https://pytorch.org/get-started/locally/
    - transformers==5.5.0
    - accelerate==1.13.0
    - qwen-vl-utils==0.0.8
