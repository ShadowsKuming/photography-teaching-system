name: photography-teaching
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # API server
    - fastapi==0.115.12
    - uvicorn[standard]==0.34.2

    # Config and validation
    - pydantic==2.11.3
    - pydantic-settings==2.9.1

    # Image processing
    - Pillow==12.2.0

    # Environment
    - python-dotenv==1.0.1

    # LLM providers
    - openai==2.30.0
    - google-genai==1.70.0

    # Local VLM backend (optional — only needed for eval_provider="qwen")
    # Install PyTorch separately first: https://pytorch.org/get-started/locally/
    # - torch
    - transformers==5.5.0
    - accelerate==1.13.0
    - qwen-vl-utils==0.0.8
