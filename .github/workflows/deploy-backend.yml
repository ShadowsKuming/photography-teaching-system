name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'requirements-minimal.txt'
      - 'Dockerfile'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/photography-teaching-system

            # Force-sync to latest main (handles any local drift on server)
            git fetch origin main
            git reset --hard origin/main

            # Build fresh image
            sudo docker build -t photography-backend .

            # Stop whichever container owns port 8000
            CONTAINER=$(sudo docker ps --filter "publish=8000" --format "{{.Names}}" | head -1)
            if [ -n "$CONTAINER" ]; then
              sudo docker stop "$CONTAINER"
              sudo docker rm "$CONTAINER"
            fi

            # Start new container
            sudo docker run -d \
              --name photography-api \
              --env-file .env \
              -p 8000:8000 \
              -v ~/photography-teaching-system/data:/app/data \
              --restart unless-stopped \
              photography-backend

            # Verify deployment
            sleep 8
            curl -f http://localhost:8000/health || exit 1
            curl -f http://localhost:8000/leaderboard/portrait || exit 1

            echo "✅ Deployment successful!"
